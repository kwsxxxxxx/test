####把配置你的OpenWRT改成自己的SSID，把192.168.100.1改成自己的路由器IP，策略组-订阅，填入你的机场订阅###


ipv6: false
vif_only: true
hide_vpn_icon: false
geoip_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
asn_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb
proxy_latency_test_url: https://www.apple.com/library/test/success.html
direct_latency_test_url: http://wifi.vivo.com.cn/generate_204
compat_route: false
vif_excluded_routes:
- 193.168.0.0/24
- 172.16.0.0/12
- 10.0.0.0/8
- 192.168.0.0/16
dns:
  bootstrap:
  - 223.5.5.5
  - 119.29.29.29
  upstreams:
    SSID转发:
    - 192.168.100.1
    谷歌:
    - https://8.8.8.8/dns-query
    国外:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
    国内:
    - https://doh.mobiledns.cn/dns-query
    - https://doh.pub/dns-query
    - h3://dns.alidns.com/dns-query
    腾讯:
    - https://doh.pub/dns-query
    阿里:
    - h3://dns.alidns.com/dns-query
    字节:
    - h3://dns.alidns.com/dns-query
  forward:
  - ssid:
      match: OpenWRT_5G
      value: SSID转发
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/jadkg/egern/refs/heads/main/例外.lsr
      value: 国外
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/YouTube.lsr
      value: 谷歌
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Google.lsr
      value: 谷歌
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/DouYin.lsr
      value: 字节
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/TestFlight.lsr
      value: 国外
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Apple.lsr
      value: 国内
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Alibaba.lsr
      value: 阿里
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Tencent.lsr
      value: 腾讯
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/ChinaMax.lsr
      value: 国内
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Global.lsr
      value: 国外
      disabled: false
  - domain_wildcard:
      match: '*'
      value: 国外
      disabled: false
  proxy_nameservers:
  - h3://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
