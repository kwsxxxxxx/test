ipv6: false
allow_external_connections: true
vif_only: true
block_quic: true
geoip_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-Country.mmdb
asn_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb
proxy_latency_test_url: http://connectivitycheck.android.com/generate_204
direct_latency_test_url: http://wifi.vivo.com.cn/generate_204
udp_latency_test_url: whoami.cloudflare@1.1.1.1
dns:
  bootstrap:
  - 223.5.5.5
  - 119.29.29.29
  upstreams:
    ChinaDNS:
    - 223.5.5.5
    - 119.29.29.29
    GlobalDNS:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  forward:
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/direct.txt
      value: ChinaDNS
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/cncidr.txt
      value: ChinaDNS
      disabled: false
  - domain_wildcard:
      match: '*'
      value: GlobalDNS
      disabled: false
  proxy_nameservers:
  - 223.5.5.5
  - 119.29.29.29
  public_ip_lookup_url: https://ifconfig.me/ip
policy_groups:
- select:
    name: PROXY
    policies:
    - Select
    - United States
    - Hong Kong
    - Singapore
    - Taiwan
    - Japan
    - Korea
    flatten: false
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
    hidden: false
- external:
    name: Subscription url
    type: fallback
    urls:
    - your Subscription url
    hidden: true
- select:
    name: Select
    policies:
    - Subscription
    flatten: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png
    hidden: false
- auto_test:
    name: United States
    policies:
    - Subscription
    flatten: true
    filter: 🇺🇸|美国|United States|US
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
    hidden: false
- auto_test:
    name: Hong Kong
    policies:
    - Subscription
    flatten: true
    filter: 🇭🇰|香港|Hong Kong|HK
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
    hidden: false
- auto_test:
    name: Singapore
    policies:
    - Subscription
    flatten: true
    filter: 🇸🇬|新加坡|Singapore|SG
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
    hidden: false
- auto_test:
    name: Taiwan
    policies:
    - Subscription
    flatten: true
    filter: 🇨🇳|台湾|Taiwan|TW
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
    hidden: false
- auto_test:
    name: Japan
    policies:
    - Subscription
    flatten: true
    filter: 🇯🇵|日本|Japan|JP
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
    hidden: false
- auto_test:
    name: Korea
    policies:
    - Subscription
    flatten: true
    filter: 🇰🇷|韩国|Korea|KR
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png
    hidden: false
rules:
- rule_set:
    match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/direct.txt
    policy: DIRECT
    disabled: false
- rule_set:
    match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/cncidr.txt
    policy: DIRECT
    disabled: false
- rule_set:
    match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Lan/Lan.list
    policy: DIRECT
    disabled: false
- geoip:
    match: CN
    policy: DIRECT
    no_resolve: true
    disabled: false
- default:
    policy: PROXY
mitm:
  ca_p12: egern.p12
  ca_passphrase: egern
modules:
- url: https://kelee.one/Tool/Loon/Lpx/Bilibili_remove_ads.lpx
  enabled: true
- url: https://kelee.one/Tool/Loon/Lpx/RedPaper_remove_ads.lpx
  enabled: true
- url: https://kelee.one/Tool/Loon/Lpx/YouTube_remove_ads.lpx
  enabled: true
